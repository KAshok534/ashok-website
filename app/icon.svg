<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="10" fill="#0e0d0b"/>
  <!-- AK monogram set in serif, gold ink -->
  <text
    x="50%"
    y="54%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Fraunces', 'Cormorant Garamond', Georgia, serif"
    font-size="32"
    font-weight="500"
    font-style="italic"
    fill="#c9a86a"
    letter-spacing="-1"
  >ak</text>
  <!-- hairline rule beneath -->
  <line x1="20" y1="48" x2="44" y2="48" stroke="#c9a86a" stroke-width="0.7" opacity="0.7"/>
</svg>
